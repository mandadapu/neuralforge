apiVersion: v1
kind: ServiceAccount
metadata:
  name: neuralforge
  namespace: neuralforge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neuralforge-executor
  namespace: neuralforge
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neuralforge-executor
  namespace: neuralforge
subjects:
  - kind: ServiceAccount
    name: neuralforge
    namespace: neuralforge
roleRef:
  kind: Role
  name: neuralforge-executor
  apiGroup: rbac.authorization.k8s.io
